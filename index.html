<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queensferry Music Collective</title>
    <style>
        /* ... (Insert your CSS from the previous version here) ... */
    </style>
</head>
<body>

    <header id="home"><img src="header.png" alt="Collective Header" class="hero-image"></header>
    <nav>
        <div class="container nav-flex">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#events">Upcoming</a></li>
                <li><a href="#playlists">Music</a></li>
                <li><a href="#join">Join</a></li>
            </ul>
            <button class="theme-btn" id="theme-toggle">MODE 🌓</button>
        </div>
    </nav>

    <section class="poster-section" id="events">
        <div class="container">
            <h2>Upcoming Nights</h2>
            <img src="events.png" alt="Events Calendar" class="poster-image">
            
            <div id="event-container">
                <p>Loading the latest tunes and dates...</p>
            </div>
        </div>
    </section>

    <section id="playlists">
        <div class="container">
            <h2>The Music</h2>
            <p>Listen to our collaborative playlists:</p>
            <div id="playlist-container" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
        </div>
    </section>

    <script>
        // 1. DATA FETCHING ENGINE
        async function initQMC() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                // Render Events
                const eventContainer = document.getElementById('event-container');
                eventContainer.innerHTML = data.events.map(event => `
                    <div class="night-card" style="${event.isSpecial ? 'border-color: var(--vinyl-orange);' : ''}">
                        <div class="night-card-content">
                            <div>
                                <h3>${event.date}</h3>
                                <p><strong>${event.title}</strong> @ ${event.location}</p>
                                ${event.tagline ? `<p class="genre-tagline">${event.tagline}</p>` : ''}
                                <p>${event.description}</p>
                                ${event.subtext ? `<p style="font-size: 0.9rem; color: var(--text-dim);">${event.subtext}</p>` : ''}
                            </div>
                            <div>
                                <img src="${event.image}" alt="${event.title}" class="night-image">
                            </div>
                        </div>
                    </div>
                `).join('');

                // Render Playlists
                const playlistContainer = document.getElementById('playlist-container');
                playlistContainer.innerHTML = data.playlists.map(pl => `
                    <a href="${pl.url}" class="btn btn-spotify" target="_blank">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="margin-right:8px;"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.485 17.303c-.215.353-.674.464-1.027.249-2.812-1.718-6.352-2.107-10.52-1.154-.404.092-.81-.16-.902-.564-.092-.403.16-.81.564-.902 4.564-1.043 8.484-.6 11.635 1.323.353.215.464.674.25 1.028zm1.464-3.26c-.27.44-.847.58-1.287.31-3.218-1.977-8.125-2.55-11.93-1.396-.496.15-1.022-.128-1.173-.625-.15-.495.128-1.02.625-1.17 4.343-1.317 9.754-.668 13.454 1.6 0 .44-.14.996-.31 1.436.31 1.39-.31 1.31zm.126-3.41c-3.858-2.29-10.212-2.503-13.886-1.387-.59.18-1.22-.155-1.4-.745-.18-.59.155-1.22.745-1.4 4.22-1.28 11.235-1.026 15.65 1.595.53.315.706 1 .39 1.53-.31.53-1 .705-1.53.39-.03-.02-.03-.02-.03-.02z"/></svg>
                        ${pl.name}
                    </a>
                `).join('');

            } catch (err) {
                console.error("Error loading QMC data:", err);
            }
        }

        // 2. THEME PERSISTENCE (Existing Logic)
        const toggleBtn = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');

        toggleBtn.addEventListener('click', () => {
            const isLight = document.body.getAttribute('data-theme') === 'light';
            document.body.toggleAttribute('data-theme', !isLight);
            localStorage.setItem('theme', isLight ? 'dark' : 'light');
        });

        // Run on load
        initQMC();
    </script>
</body>
</html>
