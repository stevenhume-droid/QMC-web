<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queensferry Music Collective | South Queensferry, Scotland</title>
    <style>
        /* --- BRANDING & THEME VARIABLES --- */
        :root {
            --spotify-green: #1DB954;
            --facebook-blue: #1877F2;
            --vinyl-orange: #ff4d00;
            --accent-gold: #f1c40f;
            --bg-color: #000000;
            --nav-bg: rgba(18, 18, 18, 0.96);
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --border-color: #333;
        }

        [data-theme="light"] {
            --bg-color: #f8f9fa;
            --nav-bg: rgba(255, 255, 255, 0.98);
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-dim: #444;
            --border-color: #ddd;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
            scroll-behavior: smooth;
        }

        .container { width: 90%; max-width: 1100px; margin: 0 auto; }

        /* --- HEADERS --- */
        header { background: #000; text-align: center; }
        .hero-image { width: 100%; height: auto; display: block; margin: 0 auto; max-width: 1200px; }
        
        .poster-section { background: var(--card-bg); padding: 60px 0; text-align: center; border-bottom: 2px solid var(--accent-gold); }
        .poster-image { max-width: 800px; width: 95%; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); margin-bottom: 20px;}

        /* --- NAVIGATION --- */
        nav { background: var(--nav-bg); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-color); padding: 15px 0; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        nav a { color: var(--text-main); text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        nav a:hover { color: var(--vinyl-orange); }
        .theme-btn { background: none; border: 2px solid var(--vinyl-orange); color: var(--vinyl-orange); padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }

        /* --- CONTENT --- */
        section { padding: 80px 0; border-bottom: 1px solid var(--border-color); }
        h2 { font-size: 2.2rem; border-left: 5px solid var(--vinyl-orange); padding-left: 20px; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }

        /* --- UPCOMING CARDS --- */
        .night-card { background: var(--card-bg); padding: 35px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 30px; transition: transform 0.3s ease; text-align: left; }
        .night-card:hover { transform: translateY(-5px); border-color: var(--accent-gold); }
        .night-card h3 { color: var(--vinyl-orange); margin-top: 0; font-size: 1.6rem;}
        .genre-tagline { color: var(--accent-gold); font-style: italic; font-weight: 600; margin: 15px 0; }

        .night-card-content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: center;}
        .night-image { width: 100%; border-radius: 8px; border: 1px solid var(--border-color); transition: transform 0.3s ease;}
        .night-image:hover { transform: scale(1.02); }

        /* --- BUTTONS --- */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 12px; padding: 16px 28px; border-radius: 40px; text-decoration: none; font-weight: bold; margin: 10px 5px; transition: all 0.3s ease; font-size: 0.95rem; }
        .btn-spotify { background: var(--spotify-green); color: white; }
        .btn-facebook { background: var(--facebook-blue); color: white; font-size: 1.1rem; padding: 20px 40px; }
        .btn-map { border: 2px solid var(--vinyl-orange); color: var(--vinyl-orange); }
        .btn:hover { opacity: 0.85; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        footer { text-align: center; padding: 60px 0; color: var(--text-dim); font-size: 0.85rem; }

        @media (max-width: 768px) { nav ul { display: none; } .container { width: 95%; } .night-card-content { grid-template-columns: 1fr; gap: 15px;} }
    </style>
</head>
<body>

    <header id="home"><img src="header.png" alt="Collective Header" class="hero-image"></header>

    <nav>
        <div class="container nav-flex">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#events">Upcoming</a></li>
                <li><a href="#playlists">Music</a></li>
                <li><a href="#join">Join</a></li>
            </ul>
            <button class="theme-btn" id="theme-toggle">MODE 🌓</button>
        </div>
    </nav>

    <section class="poster-section" id="events">
        <div class="container">
            <h2>Upcoming Nights</h2>
            <img src="events.png" alt="Events Calendar" class="poster-image">
            
            <div id="event-container">
                <p>Spinning the decks... loading events.</p>
            </div>
        </div>
    </section>

    <section id="playlists">
        <div class="container">
            <h2>The Music</h2>
            <div id="playlist-container" style="display: flex; flex-wrap: wrap; gap: 5px;"></div>
        </div>
    </section>

    <section id="join" style="text-align: center; padding: 100px 0;">
        <div class="container">
            <h2>Get Involved</h2>
            <a href="https://facebook.com/groups/your-group" class="btn btn-facebook" target="_blank">JOIN THE FACEBOOK GROUP</a>
        </div>
    </section>

    <footer>
        <p>© 2026 QUEENSFERRY MUSIC COLLECTIVE</p>
    </footer>

    <script>
        async function initQMC() {
            try {
                // IMPORTANT: Ensure data.json is in the same folder!
                const response = await fetch('./data.json');
                const data = await response.json();
                
                // Render Events
                const eventContainer = document.getElementById('event-container');
                eventContainer.innerHTML = data.events.map(event => `
                    <div class="night-card" style="${event.isSpecial ? 'border-color: var(--vinyl-orange);' : ''}">
                        <div class="night-card-content">
                            <div>
                                <h3>${event.date}</h3>
                                <p><strong>${event.title}</strong> @ ${event.location}</p>
                                ${event.tagline ? `<p class="genre-tagline">${event.tagline}</p>` : ''}
                                <p>${event.description}</p>
                                ${event.subtext ? `<p style="font-size: 0.9rem; color: var(--text-dim);">${event.subtext}</p>` : ''}
                            </div>
                            <div>
                                <img src="${event.image}" alt="${event.title}" class="night-image">
                            </div>
                        </div>
                    </div>
                `).join('');

                // Render Playlists
                const playlistContainer = document.getElementById('playlist-container');
                playlistContainer.innerHTML = data.playlists.map(pl => `
                    <a href="${pl.url}" class="btn btn-spotify" target="_blank">
                        ${pl.name}
                    </a>
                `).join('');

            } catch (err) {
                console.error("Data fetch failed:", err);
                document.getElementById('event-container').innerHTML = "<p>Unable to load events. Check your data.json file.</p>";
            }
        }

        // Theme Toggle Logic
        const toggleBtn = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');

        toggleBtn.addEventListener('click', () => {
            const isLight = document.body.getAttribute('data-theme') === 'light';
            document.body.toggleAttribute('data-theme', !isLight);
            localStorage.setItem('theme', isLight ? 'dark' : 'light');
        });

        initQMC();
    </script>
</body>
</html>
